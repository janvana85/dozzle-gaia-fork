services:
  custom_base:
    image: ${DOZZLE_IMAGE_PREFIX:-dozzle-gaia-fork}-custom_base:latest
    container_name: custom_base
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - DOZZLE_FILTER=name=custom_base
      - DOZZLE_BASE=/foobarbase
      - DOZZLE_NO_ANALYTICS=1
      - DOZZLE_HOSTNAME=custom name
    ports:
      - 8080:8080
    build:
      context: .
  simple-auth:
    image: ${DOZZLE_IMAGE_PREFIX:-dozzle-gaia-fork}-simple-auth:latest
    container_name: simple-auth
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - DOZZLE_AUTH_PROVIDER=simple
      - DOZZLE_NO_ANALYTICS=1
    build:
      context: .
  dozzle:
    image: ${DOZZLE_IMAGE_PREFIX:-dozzle-gaia-fork}-dozzle:latest
    container_name: dozzle
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - TZ=Europe/Prague
      - DOZZLE_FILTER=name=dozzle
      - DOZZLE_NO_ANALYTICS=1
      - DOZZLE_HOSTNAME=localhost
      - DOZZLE_LEVEL=debug
    ports:
      - 7070:8080
    build:
      context: .
  remote:
    image: ${DOZZLE_IMAGE_PREFIX:-dozzle-gaia-fork}-remote:latest
    container_name: remote
    environment:
      - DOZZLE_REMOTE_HOST=tcp://proxy:2375|remote-host
      - DOZZLE_FILTER=name=dozzle
      - DOZZLE_NO_ANALYTICS=1
    ports:
      - 5050:8080
    build:
      context: .
    depends_on:
      proxy:
        condition: service_healthy
  dozzle-with-agent:
    image: ${DOZZLE_IMAGE_PREFIX:-dozzle-gaia-fork}-with-agent:latest
    container_name: with-agent
    environment:
      - DOZZLE_REMOTE_AGENT=agent:7007
      - DOZZLE_NO_ANALYTICS=1
      - DOZZLE_LEVEL=debug
    ports:
      - 8082:8080
    build:
      context: .
    depends_on:
      agent:
        condition: service_healthy
  agent:
    image: ${DOZZLE_IMAGE_PREFIX:-dozzle-gaia-fork}-agent:latest
    container_name: agent
    command: agent
    environment:
      - TZ=Europe/Prague
      - DOZZLE_HOSTNAME=production-agent
      - DOZZLE_NO_ANALYTICS=1
    healthcheck:
      test: ["CMD", "/dozzle", "healthcheck"]
      interval: 5s
      retries: 5
      start_period: 5s
      start_interval: 5s
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    build:
      context: .
  proxy:
    container_name: proxy
    image: tecnativa/docker-socket-proxy
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - CONTAINERS=1
    healthcheck:
      test: ["CMD", "nc", "-z", "127.0.0.1", "2375"]
      interval: 5s
      retries: 5
      start_period: 5s
      start_interval: 5s
    ports:
      - 2375:2375
