name: Test

on:
  workflow_dispatch:
    inputs:
      run_typecheck:
        description: Run Typecheck job
        type: boolean
        default: true
      run_js_tests:
        description: Run JavaScript test job
        type: boolean
        default: true
      run_go_tests:
        description: Run Go test job
        type: boolean
        default: true
      run_staticcheck:
        description: Run staticcheck job
        type: boolean
        default: true
      run_integration_tests:
        description: Run Playwright integration job
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  typecheck:
    name: Typecheck
    if: ${{ inputs.run_typecheck }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        name: Install pnpm
      - uses: actions/setup-node@v6
        name: Install Node
        with:
          node-version: 24.16.0
      - run: corepack enable
      - run: pnpm --version
      - uses: actions/setup-node@v6
        with:
          node-version: 24.16.0
          cache: "pnpm"
          cache-dependency-path: "**/pnpm-lock.yaml"
      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prefer-offline
      - name: Run Typecheck
        run: pnpm run typecheck

  npm-test:
    name: JavaScript Tests
    if: ${{ inputs.run_js_tests }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        name: Install pnpm
      - run: corepack enable
      - run: pnpm --version
      - uses: actions/setup-node@v6
        with:
          node-version: 24.16.0
          cache: "pnpm"
          cache-dependency-path: "**/pnpm-lock.yaml"
      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prefer-offline
      - name: Run Tests
        run: pnpm run test -- --outputTruncateLength=500

  go-test:
    name: Go Tests
    if: ${{ inputs.run_go_tests }}
    runs-on: ubuntu-latest
    steps:
      - name: Install Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.3"
          check-latest: true
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Install Protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Install gRPC and Go
        run: |
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@latest
          go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
      - name: Run Go Tests with Coverage
        run: make test

  staticcheck:
    if: ${{ inputs.run_staticcheck }}
    runs-on: ubuntu-latest
    name: Go Staticcheck
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.3"
          check-latest: true
      - name: Generate dependencies
        run: make fake_assets shared_key.pem shared_cert.pem
      - name: Stactic checker
        uses: dominikh/staticcheck-action@v1.4.1
        with:
          install-go: false

  int-test:
    name: Integration Tests
    if: ${{ inputs.run_integration_tests }}
    timeout-minutes: 60
    runs-on: ubuntu-latest
    env:
      DOZZLE_IMAGE_PREFIX: dozzle-gaia-fork
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        name: Install pnpm
      - uses: actions/setup-node@v6
        name: Install Node
        with:
          node-version: 24.16.0
      - run: corepack enable
      - run: pnpm --version
      - uses: actions/setup-node@v6
        with:
          node-version: 24.16.0
          cache: "pnpm"
          cache-dependency-path: "**/pnpm-lock.yaml"
      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prefer-offline
      - name: Generate certs
        run: make shared_key.pem shared_cert.pem
      - name: Build Docker images for Playwright
        run: |
          docker build \
            -t "${DOZZLE_IMAGE_PREFIX}-dozzle:latest" \
            --build-arg TAG=dev \
            .
          docker tag "${DOZZLE_IMAGE_PREFIX}-dozzle:latest" "${DOZZLE_IMAGE_PREFIX}-simple-auth:latest"
          docker tag "${DOZZLE_IMAGE_PREFIX}-dozzle:latest" "${DOZZLE_IMAGE_PREFIX}-custom_base:latest"
          docker tag "${DOZZLE_IMAGE_PREFIX}-dozzle:latest" "${DOZZLE_IMAGE_PREFIX}-remote:latest"
          docker tag "${DOZZLE_IMAGE_PREFIX}-dozzle:latest" "${DOZZLE_IMAGE_PREFIX}-with-agent:latest"
          docker tag "${DOZZLE_IMAGE_PREFIX}-dozzle:latest" "${DOZZLE_IMAGE_PREFIX}-agent:latest"
      - name: Debug Docker images
        run: |
          docker image ls --format '{{.Repository}}:{{.Tag}}' | rg '^dozzle-gaia-fork-' || true
          docker compose -f docker-compose.yml -f docker-compose.e2e.yml config
      - name: Run Playwright tests
        run: docker compose -f docker-compose.yml -f docker-compose.e2e.yml up --no-build --exit-code-from playwright
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
