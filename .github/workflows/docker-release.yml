name: Docker Release

on:
  push:
    tags:
      - "v*-gaia"
  workflow_dispatch:
    inputs:
      tag:
        description: Docker tag to publish
        type: string
        required: true
        default: latest

permissions:
  contents: read
  actions: write
  packages: read

concurrency:
  group: docker-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    name: Build and publish image
    runs-on: ubuntu-latest
    env:
      DOZZLE_IMAGE_PREFIX: dozzle-gaia-fork
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4.2.0
        with:
          username: janvana85
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Resolve tag
        id: resolve
        run: |
          # On a tag push use the git tag name; on manual dispatch use the input.
          if [ "${{ github.event_name }}" = "push" ]; then
            tag="${GITHUB_REF_NAME}"
          else
            tag="${{ inputs.tag }}"
          fi
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: janvana85/dozzle-gaia
          tags: |
            type=raw,value=${{ steps.resolve.outputs.tag }}

      - name: Build version
        id: build-version
        run: |
          short_sha="${GITHUB_SHA::12}"
          echo "version=${{ steps.resolve.outputs.tag }}-${short_sha}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v7.2.0
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            TAG=${{ steps.build-version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
