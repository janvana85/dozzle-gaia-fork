name: Docker Caching Build

on:
  push:
    branches:
      - dozzle-gaia-caching
  workflow_dispatch:

permissions:
  contents: read
  packages: read

concurrency:
  group: docker-caching-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build and publish caching image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4.2.0
        with:
          username: janvana85
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: janvana85/dozzle-gaia
          tags: |
            type=raw,value=dozzle-gaia-caching
            type=raw,value=caching-latest
            type=sha,prefix=caching-sha-

      - name: Build and push image
        uses: docker/build-push-action@v7.2.0
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            TAG=dozzle-gaia-caching
          cache-from: type=gha
          cache-to: type=gha,mode=max
