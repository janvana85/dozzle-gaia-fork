name: Docker

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  actions: write
  packages: read

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prepare:
    name: Build image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4.2.0
        with:
          username: janvana85
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: janvana85/dozzle-gaia
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}

      - name: Build image
        uses: docker/build-push-action@v7.2.0
        with:
          context: .
          push: false
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            TAG=${{ steps.meta.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  publish:
    name: Publish image
    needs: prepare
    runs-on: ubuntu-latest
    environment:
      name: docker-publish
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4.2.0
        with:
          username: janvana85
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: janvana85/dozzle-gaia
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}

      - name: Build and push
        uses: docker/build-push-action@v7.2.0
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            TAG=${{ steps.meta.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Prune old Docker Hub SHA tags
        env:
          DOCKERHUB_USERNAME: janvana85
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          DOCKERHUB_NAMESPACE: janvana85
          DOCKERHUB_REPOSITORY: dozzle-gaia
          KEEP_SHA_TAGS: "10"
        run: |
          node <<'NODE'
          const username = process.env.DOCKERHUB_USERNAME;
          const password = process.env.DOCKERHUB_TOKEN;
          const namespace = process.env.DOCKERHUB_NAMESPACE;
          const repository = process.env.DOCKERHUB_REPOSITORY;
          const keep = Number.parseInt(process.env.KEEP_SHA_TAGS || "10", 10);

          async function request(url, options = {}) {
            const response = await fetch(url, options);
            if (!response.ok) {
              const body = await response.text();
              throw new Error(`${options.method || "GET"} ${url} failed: ${response.status} ${body}`);
            }
            if (response.status === 204) return null;
            return response.json();
          }

          const login = await request("https://hub.docker.com/v2/users/login/", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ username, password }),
          });

          const headers = { Authorization: `JWT ${login.token}` };
          let next = `https://hub.docker.com/v2/repositories/${namespace}/${repository}/tags?page_size=100`;
          const tags = [];

          while (next) {
            const page = await request(next, { headers });
            tags.push(...page.results);
            next = page.next;
          }

          const shaTags = tags
            .filter((tag) => tag.name.startsWith("sha-"))
            .sort((a, b) => new Date(b.last_updated) - new Date(a.last_updated));
          const staleTags = shaTags.slice(keep);

          console.log(`Found ${shaTags.length} sha-* tags. Keeping ${Math.min(keep, shaTags.length)} newest.`);

          for (const tag of staleTags) {
            const tagName = encodeURIComponent(tag.name);
            await request(`https://hub.docker.com/v2/repositories/${namespace}/${repository}/tags/${tagName}/`, {
              method: "DELETE",
              headers,
            });
            console.log(`Deleted ${tag.name}`);
          }
          NODE
