services:
  dozzle:
    build:
      context: .
    container_name: dozzle
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./data:/data
      - ./cache:/cache
    ports:
      - "8080:8080"
    environment:
      # Runtime timezone only; quiet-hours timezone is still configured in Dozzle.
      - TZ=Europe/Prague
      - DOZZLE_NO_ANALYTICS=1
      - DOZZLE_LOG_CACHE_DIR=/cache
      # Optional: enable simple auth (requires /data/users.yml)
      # - DOZZLE_AUTH_PROVIDER=simple
      # Optional: custom hostname shown in the UI
      # - DOZZLE_HOSTNAME=my-server
      # Optional: log level (debug, info, warn, error)
      # - DOZZLE_LEVEL=info
    networks:
      - npm-bridge

networks:
  npm-bridge:
    external: true
