services:
  dozzle:
    build:
      context: .
    container_name: dozzle
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - dozzle-data:/data
    ports:
      - "8080:8080"
    environment:
      - DOZZLE_NO_ANALYTICS=1
      # Optional: enable simple auth (requires /data/users.yml)
      # - DOZZLE_AUTH_PROVIDER=simple
      # Optional: custom hostname shown in the UI
      # - DOZZLE_HOSTNAME=my-server
      # Optional: log level (debug, info, warn, error)
      # - DOZZLE_LEVEL=info

volumes:
  dozzle-data:
